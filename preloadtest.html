<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">    
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.xearsweb</title>
    <link rel="icon" href="icon.png" type="image/png"> 

    <style>
            body, html {
                background-color: black;
                font-family: "Pixelify Sans", sans-serif;
                height: 100%;
                margin: 0;
                padding: 0;
                color: #c0c0c0;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                position: relative;
                overflow-x: hidden;
            }
            #video-background {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                object-fit: cover;

            }
            /* Добавьте этот новый блок для основного контента */
            .content {
                opacity: 0;
                transition: opacity 0.5s ease-out;
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                position: relative;
                z-index: 1;
            }

            .content.visible {
                opacity: 1;
            }
            .head {
                margin-left: 15px;
                margin-top: 15px;
                font-size: 22px;
                z-index: 2;
                position: relative;
            }
            .main {
                margin-left: 15px;
                margin-bottom: 15px;
                vertical-align: bottom;
                font-size: 18px;
                z-index: 1;
                position: relative;
            }
            p {
                text-align: left;
                font-size: 16px;
            }
            a {
                color: #c0c0c0;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }
            
            /* Стили для анимации ссылок на эллипсе */
            .orbit-container {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 1;
            }
            
            .moving-links-container {
                position: relative;
                width: 100%;
                height: 100%;
            }
            
            .moving-link {
                position: absolute;
                white-space: nowrap;
                color: #c0c0c0;
                font-family: "Pixelify Sans", sans-serif;
                font-size: 16px;
                background: transparent;
                padding: 2px 6px;
                cursor: pointer;
                display: inline-block;
                pointer-events: auto;
                transition: opacity 0.15s ease, transform 0.15s ease;
                border-radius: 4px;
                text-shadow: 0 0 5px rgba(0,0,0,0.5);
            }
            
            .moving-link:hover {
                opacity: 0.8;
                transform: scale(1.1);
                text-decoration: underline;
            }
            
            .ellipse-canvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                display: block;
            }
            
            /* Стили для экрана загрузки */
            .loading-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: black;
                z-index: 9999;
                display: flex;
                justify-content: flex-end;
                align-items: flex-end;
                transition: opacity 0.1s ease-out, visibility 0.1s ease-out;
            }

            /* Стили для анимированного текста */
            .loading-text {
                color: rgb(198, 198, 198);
                font-size: 18px;
                font-family: "Pixelify Sans", monospace;
                margin: 15px;
                opacity: 0;
                animation: fadeIn 0.5s ease-out forwards;
            }

            /* Анимация появления текста */
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            /* Стили для основного контента */
            .content {
                opacity: 0;
                transition: opacity 0.5s ease-out;
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }

            .content.visible {
                opacity: 1;
            }
    </style>
</head>
<body>
    <!-- Экран загрузки -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text" id="loadingText">.</div>
    </div>

    <!-- Основной контент -->
    <div class="content" id="mainContent">
        <video id="video-background" autoplay loop muted>
            <source src="backgroundvideo.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
        
        <div class="head">
            <a href="https://xearscom.github.io">.†††</a>
        </div>

        <div class="main">
            <a href="https://discord.gg/A33Q2jDTm6">discord server</a><br>
            <a href="https://t.me/xearscom">telegram</a><br>        
            <a></a><br>
            .xears 2026
        </div>
        
        <!-- Контейнер для анимации ссылок на эллипсе -->
        <div class="orbit-container">
            <canvas class="ellipse-canvas" id="ellipseCanvas"></canvas>
            <div class="moving-links-container" id="linksContainer">
                <!-- Ссылки будут добавлены скриптом -->
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Получаем элементы
            const container = document.getElementById('linksContainer');
            const canvas = document.getElementById('ellipseCanvas');
            const orbitContainer = document.querySelector('.orbit-container');
            
            // Массив ссылок
            let links = [];
            
            // Параметры эллипса (как в первом варианте, но чуть меньше)
            let centerX = 0, centerY = 0;
            let radiusX = 0, radiusY = 0;
            let rotationAngle = (Math.PI * 5) / 6;  // 150 градусов
            let offsetX = 100; // Смещение эллипса вправо
            
            // Текущий угол поворота всей системы
            let globalAngle = 0;
            let animationId = null;
            let lastTimestamp = null;
            
            // Скорость движения (радиан в секунду)
            const speedRadPerSecond = 0.05;
            
            // Храним состояние наведения для каждой ссылки
            let hoverStates = new Map();
            
            // Функция для вычисления координат точки на повернутом эллипсе со смещением
            function getEllipsePoint(angle) {
                const a = radiusX;
                const b = radiusY;
                const rot = rotationAngle;
                
                const cosT = Math.cos(angle);
                const sinT = Math.sin(angle);
                const cosRot = Math.cos(rot);
                const sinRot = Math.sin(rot);
                
                const x = centerX + a * cosT * cosRot - b * sinT * sinRot + offsetX;
                const y = centerY + a * cosT * sinRot + b * sinT * cosRot;
                
                return { x, y };
            }
            
            // Обновление позиции всех ссылок
            function updateAllLinksPositions() {
                if (!container) return;
                
                const linkCount = links.length;
                if (linkCount === 0) return;
                
                // Ссылки равномерно распределены по окружности
                const angleStep = (Math.PI * 2) / linkCount;
                
                links.forEach((link, index) => {
                    if (!link.element) return;
                    
                    // Угол для текущей ссылки
                    let linkAngle = globalAngle + (index * angleStep);
                    linkAngle = linkAngle % (Math.PI * 2);
                    if (linkAngle < 0) linkAngle += Math.PI * 2;
                    
                    const point = getEllipsePoint(linkAngle);
                    const linkWidth = link.element.offsetWidth;
                    const linkHeight = link.element.offsetHeight;
                    
                    const leftPos = point.x - (linkWidth / 2);
                    const topPos = point.y - (linkHeight / 2);
                    
                    link.element.style.left = `${leftPos}px`;
                    link.element.style.top = `${topPos}px`;
                    
                    link.currentAngle = linkAngle;
                });
            }
            
            // Отрисовка эллипса
            function drawEllipse() {
                if (!canvas || !orbitContainer) return;
                
                const rect = orbitContainer.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Рисуем наклонённый эллипс со смещением
                ctx.save();
                ctx.translate(centerX + offsetX, centerY);
                ctx.rotate(rotationAngle);
                ctx.beginPath();
                ctx.ellipse(0, 0, radiusX, radiusY, 0, 0, Math.PI * 2);
                ctx.restore();
                
                // Стиль эллипса - полупрозрачный
                ctx.strokeStyle = 'rgba(192, 192, 192, 0.6)';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.setLineDash([]);
            }
            
            // Обновление размеров эллипса (как в первом варианте, но чуть меньше)
            function updateDimensions() {
                if (!orbitContainer) return;
                
                const rect = orbitContainer.getBoundingClientRect();
                const width = rect.width;
                const height = rect.height;
                
                centerX = width / 2;
                centerY = height / 2;
                
                // Получаем максимальные размеры ссылки
                let maxLinkWidth = 80;
                let maxLinkHeight = 24;
                links.forEach(link => {
                    if (link.element) {
                        maxLinkWidth = Math.max(maxLinkWidth, link.element.offsetWidth);
                        maxLinkHeight = Math.max(maxLinkHeight, link.element.offsetHeight);
                    }
                });
                
                // Максимально возможные радиусы
                const maxRadiusX = (width / 2) - (maxLinkWidth / 2) - 15;
                const maxRadiusY = (height / 2) - (maxLinkHeight / 2) - 15;
                
                // Как в первом варианте, но чуть меньше (было 0.44 и 0.24, уменьшаем на ~15%)
                let rawRadiusX = Math.min(maxRadiusX, width * 0.38);
                let rawRadiusY = Math.min(maxRadiusY, height * 0.21);
                
                // Сохраняем вытянутую форму как в первом варианте
                if (rawRadiusX < rawRadiusY * 2.0) {
                    rawRadiusX = rawRadiusY * 2.0;
                    if (rawRadiusX > maxRadiusX) {
                        rawRadiusX = maxRadiusX;
                        rawRadiusY = maxRadiusX / 2.0;
                    }
                }
                
                radiusX = Math.max(rawRadiusX, 95);
                radiusY = Math.max(rawRadiusY, 42);
                
                // Дополнительная корректировка для сохранения пропорций
                if (radiusX < radiusY * 1.8) {
                    radiusX = radiusY * 1.9;
                    if (radiusX > maxRadiusX) radiusX = maxRadiusX;
                }
                
                // Ограничиваем максимальный размер, чтобы не выходил за границы
                if (radiusX > maxRadiusX) radiusX = maxRadiusX;
                if (radiusY > maxRadiusY) radiusY = maxRadiusY;
                
                drawEllipse();
                updateAllLinksPositions();
            }
            
            // Анимация движения
            function animateEllipse(timestamp) {
                if (!animationId) return;
                
                // Проверяем, есть ли активные наведения
                let anyHover = false;
                for (const [id, isHover] of hoverStates) {
                    if (isHover) {
                        anyHover = true;
                        break;
                    }
                }
                
                // Если ни одна ссылка не под наведением - двигаем
                if (!anyHover) {
                    if (lastTimestamp === null) {
                        lastTimestamp = timestamp;
                    } else {
                        let delta = Math.min(100, timestamp - lastTimestamp);
                        if (delta > 0) {
                            const angleStep = speedRadPerSecond * (delta / 1000);
                            globalAngle += angleStep;
                            
                            if (globalAngle > Math.PI * 2) globalAngle -= Math.PI * 2;
                            if (globalAngle < 0) globalAngle += Math.PI * 2;
                            
                            updateAllLinksPositions();
                        }
                    }
                    lastTimestamp = timestamp;
                } else {
                    // Если есть наведение, просто обновляем позиции без изменения угла
                    if (lastTimestamp !== null) {
                        lastTimestamp = null;
                    }
                    updateAllLinksPositions();
                }
                
                animationId = requestAnimationFrame(animateEllipse);
            }
            
            // Запуск анимации
            function startAnimation() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                lastTimestamp = null;
                animationId = requestAnimationFrame(animateEllipse);
            }
            
            // Создание ссылки
            function createLink(url, text, id) {
                const linkElement = document.createElement('a');
                linkElement.className = 'moving-link';
                linkElement.href = url;
                linkElement.textContent = text;
                linkElement.target = '_blank';
                linkElement.rel = 'noopener noreferrer';
                
                // Обработчики наведения
                linkElement.addEventListener('mouseenter', () => {
                    hoverStates.set(id, true);
                    linkElement.style.opacity = '0.8';
                    linkElement.style.transform = 'scale(1.1)';
                });
                
                linkElement.addEventListener('mouseleave', () => {
                    hoverStates.set(id, false);
                    linkElement.style.opacity = '1';
                    linkElement.style.transform = 'scale(1)';
                });
                
                return linkElement;
            }
            
            // Добавление ссылок
            function addLinks() {
                const linksData = [
                    { url: "https://xearscom.github.io/Kyaru/", text: "кяру" },
                ];
                
                linksData.forEach((data, index) => {
                    const linkId = index;
                    const linkElement = createLink(data.url, data.text, linkId);
                    container.appendChild(linkElement);
                    
                    links.push({
                        id: linkId,
                        element: linkElement,
                        url: data.url,
                        text: data.text,
                        currentAngle: 0
                    });
                });
            }
            
            // Обработчик изменения размера окна
            let resizeTimeout;
            function handleResize() {
                if (!orbitContainer) return;
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    updateDimensions();
                    updateAllLinksPositions();
                }, 100);
            }
            
            // Инициализация
            function init() {
                if (!container || !orbitContainer) return;
                
                // Добавляем ссылки
                addLinks();
                
                // Обновляем размеры
                setTimeout(() => {
                    updateDimensions();
                    updateAllLinksPositions();
                }, 10);
                
                // Запускаем анимацию
                startAnimation();
                
                // Следим за изменением размеров
                window.addEventListener('resize', handleResize);
                
                // Используем ResizeObserver
                if (window.ResizeObserver && orbitContainer) {
                    const resizeObserver = new ResizeObserver(() => {
                        handleResize();
                    });
                    resizeObserver.observe(orbitContainer);
                }
                
                // Корректировка после полной загрузки
                window.addEventListener('load', () => {
                    setTimeout(() => {
                        handleResize();
                        updateAllLinksPositions();
                    }, 50);
                });
            }
            
            // Запускаем инициализацию
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
        
        // Скрипт для экрана загрузки
        (function() {
            const loadingText = document.getElementById('loadingText');
            const loadingScreen = document.getElementById('loadingScreen');
            const mainContent = document.getElementById('mainContent');
            
            let dotCount = 1;
            const animationInterval = setInterval(() => {
                dotCount = (dotCount % 3) + 1;
                loadingText.textContent = '.'.repeat(dotCount);
            }, 500);
            
            function hideLoadingScreen() {
                clearInterval(animationInterval);
                
                setTimeout(() => {
                    mainContent.classList.add('visible');
                    loadingScreen.style.opacity = '0';
                    
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                    }, 500);
                }, 500);
            }
            
            // Проверяем загрузку всех ресурсов
            if (document.readyState === 'complete') {
                hideLoadingScreen();
            } else {
                window.addEventListener('load', hideLoadingScreen);
            }
        })();
    </script>
</body>
</html>
